# LiteLLM Proxy Configuration for DeepSeek V4 Flash (ds4)
#
# Architecture:
#   Client → LiteLLM (11111) → ds4-server (11112)
#
# Start ds4 backend (11112):  ./start-server.sh
# Start LiteLLM proxy (11111): litellm --config /path/to/lite_llm_config.yaml
#
# Or use the combined start script: ./start-server.sh --litellm

model_list:
  - model_name: deepseek-v4-flash
    litellm_params:
      model: openai/deepseek-v4-flash
      api_base: http://localhost:11112/v1
      api_key: dsv4-local
      max_tokens: 384000
      temperature: 1.0
      top_p: 1.0
    model_info:
      supports_vision: false
      supports_function_calling: true
      context_window: 1000000

  - model_name: deepseek-chat
    litellm_params:
      model: openai/deepseek-v4-flash
      api_base: http://localhost:11112/v1
      api_key: dsv4-local
      max_tokens: 384000
      temperature: 1.0
    model_info:
      mode: chat
      supports_vision: false

litellm_settings:
  drop_params: true
  request_timeout: 600
  set_verbose: false
  json_logs: false
  max_parallel_requests: 1  # Limit concurrent requests for GPU control
  # retry_after_flag: true

router_settings:
  routing_strategy: latency-based-routing
  redis_host: null
  enable_pre_call_checks: false

general_settings:
  master_key: dsv4-local
  database_url: null
  store_model_in_db: false
